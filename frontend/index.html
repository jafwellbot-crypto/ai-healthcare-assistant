<!DOCTYPE html>
<html>
<head>
<title>AI Healthcare Assistant</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#2a7cff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1c5ed6;
}

#result{
margin-top:20px;
text-align:left;
}

.emergency{
background:red;
color:white;
padding:10px;
border-radius:5px;
font-weight:bold;
margin-bottom:10px;
}

.pill{
display:inline-block;
background:#d1ecf1;
color:#0c5460;
padding:5px 10px;
margin:4px;
border-radius:20px;
font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Healthcare Assistant</h2>

<p>Enter Patient Details</p>

<input id="name" placeholder="Patient Name">
<input id="symptom" placeholder="Symptom (example: fever)">
<input id="temperature" type="number" placeholder="Temperature">
<input id="duration" type="number" placeholder="Duration (days)">
<input id="pain" type="number" placeholder="Pain Level (0-10)">
<input id="vomit" type="number" placeholder="Vomiting Count">

<br>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script>

async function analyze(){

let name=document.getElementById("name").value;
let symptom=document.getElementById("symptom").value;
let temperature=document.getElementById("temperature").value;
let duration=document.getElementById("duration").value;
let pain=document.getElementById("pain").value;
let vomit=document.getElementById("vomit").value;

let resultDiv=document.getElementById("result");
resultDiv.innerHTML="Loading... ⏳";

try {

let response=await fetch(
"/analyze",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
symptom:symptom,
temperature:Number(temperature),
duration_days:Number(duration),
pain_level:Number(pain),
vomiting_count:Number(vomit)
})
});

let data=await response.json();

console.log("FULL API RESPONSE:", data);

resultDiv.innerHTML="";

// Emergency
if(data.severity==="emergency"){
resultDiv.innerHTML+=
"<div class='emergency'>⚠ EMERGENCY CASE – SEEK MEDICAL HELP IMMEDIATELY</div>";
}

// Severity + Score
resultDiv.innerHTML+=`
<h3>Severity: ${data.severity}</h3>
<p><b>Triage Score:</b> ${data.triage_score}</p>
`;

// MEDICINES
resultDiv.innerHTML += "<h3>Recommended Medicines</h3>";

if(data.medicines && data.medicines.length > 0){

data.medicines.forEach(med=>{
resultDiv.innerHTML += `
<span class="pill">
${med.medicine}
</span>
`;
});

}else{

resultDiv.innerHTML += "<p>No medicines found for this symptom</p>";

}

// DOCTORS
if(data.recommended_doctors && data.recommended_doctors.length > 0){

resultDiv.innerHTML+="<h3>Doctor Suggestions</h3>";

data.recommended_doctors.forEach(d=>{
resultDiv.innerHTML+=`<p>🧑‍⚕️ ${d.name || JSON.stringify(d)}</p>`;
});

}

}catch(error){

console.error(error);
resultDiv.innerHTML="<p style='color:red'>Backend error or server not reachable</p>";

}

}

</script>

</body>
</html>
